<!doctype html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ชัดชัด — แอปฝึกออกเสียงภาษาไทยสำหรับเด็ก Thai Pronunciation Practice" />
  <title>ChadChad</title>
  <link rel="icon" type="image/png" href="../assets/favicon.png" />

  <script type="module" crossorigin src="./assets/main-B2t_bfgo.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/data-BftlPpws.js">
  <link rel="stylesheet" crossorigin href="./assets/main-CQKMvlOn.css">
</head>

<body class="bg-student-bg min-h-screen text-student-text font-mitr">

  <!-- ═══════════ Hidden audio elements ═══════════ -->
  <audio id="ref-audio-listen" preload="auto"></audio>


  <div id="app" class="min-h-screen flex flex-col items-center px-5 py-6">

    <!-- ═══════════════════════════════════════════════
         VIEW 1: STAGE MAP (Level Select) — Boot View
         ═══════════════════════════════════════════════ -->
    <section id="view-stages" class="screen w-full max-w-lg flex flex-col items-center py-4">
      <!-- Header -->
      <div class="text-center mb-8 w-full">
        <h1 class="text-3xl font-bold text-slate-700 font-nunito mb-1">เลือกคำศัพท์</h1>
        <p class="text-slate-400 text-sm font-light">กรุณาเลือกคำที่อยากฝึกพูด!</p>
      </div>

      <!-- Stage Grid -->
      <div id="stage-grid" class="grid grid-cols-2 gap-4 w-full">
        <!-- Dynamically populated by main.js -->
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════
         VIEW 3: GAMEPLAY VIEW (Core)
         ═══════════════════════════════════════════════ -->
    <section id="view-gameplay" class="screen hidden w-full max-w-md flex flex-col items-center gap-5 py-4">

      <!-- Back Button -->
      <button id="btn-back"
        class="self-start flex items-center gap-2 text-slate-400 hover:text-slate-600 text-sm font-light transition-colors mb-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        กลับ
      </button>

      <!-- Word Card -->
      <article class="bg-white rounded-3xl shadow-md w-full p-8 text-center">
        <!-- Illustration Placeholder -->
        <div id="word-image-container"
          class="word-image-container w-32 h-32 mx-auto mb-4 rounded-2xl bg-slate-50 flex items-center justify-center overflow-hidden">
          <img id="word-image" src="/elephant.png" alt="" class="w-full h-full object-contain drop-shadow-md" />
        </div>

        <!-- Target Word -->
        <h2 id="word-thai" class="text-7xl font-bold text-slate-700 leading-tight mb-1 font-nunito">ช้าง</h2>
        <p id="word-romanized" class="text-slate-400 text-sm font-light">Chang — Elephant</p>
      </article>

      <!-- Speaker + Mic Controls -->
      <div class="flex items-center justify-center gap-10 w-full py-2">
        <!-- Listen (Speaker) Button -->
        <button id="btn-listen" aria-label="ฟังเสียง"
          class="flex flex-col items-center gap-1 text-slate-400 hover:text-student-blue transition-colors">
          <div
            class="w-14 h-14 rounded-full bg-white shadow-md flex items-center justify-center hover:shadow-lg transition-shadow">
            <svg id="speaker-icon" class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="1.8"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.536 8.464a5 5 0 010 7.072M17.95 6.05a8 8 0 010 11.9M11 5L6 9H2v6h4l5 4V5z" />
            </svg>
          </div>
          <span class="text-xs font-light">ฟังเสียง</span>
        </button>

        <!-- Microphone Button (Tap-to-Toggle) -->
        <div class="relative flex flex-col items-center gap-2">
          <div id="recording-indicator"
            class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full border-2 border-white z-10 transition-opacity"
            style="opacity: 0;">
          </div>
          <button id="btn-mic" aria-label="กดเพื่อพูด"
            class="w-24 h-24 rounded-full bg-student-blue shadow-xl shadow-blue-500/30 text-white flex items-center justify-center hover:shadow-blue-500/50 hover:-translate-y-1 active:scale-95 transition-all duration-200 relative z-10">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3zM19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8" />
            </svg>
          </button>
          <p id="mic-hint" class="text-xs text-slate-400 font-light">กดเพื่อพูด</p>
        </div>
      </div>

      <!-- Recognized Text -->
      <div id="recognized-text"
        class="bg-white rounded-2xl px-5 py-3 text-center text-base text-slate-600 shadow-sm w-full transition-all duration-300"
        style="opacity: 0; pointer-events: none;">
      </div>

      <!-- 4 Progress Bars (พยัญชนะ, สระ, ตัวสะกด, วรรณยุกต์) -->
      <div id="results" class="bg-white rounded-2xl shadow-sm p-6 w-full space-y-4 transition-all duration-500"
        style="opacity: 0; pointer-events: none;">

        <!-- พยัญชนะ (Initial Consonant) — Pastel Cyan -->
        <div id="gauge-consonant">
          <div class="flex justify-between items-baseline mb-1.5">
            <span class="text-sm font-medium text-slate-500">พยัญชนะ</span>
            <span class="gauge-value text-sm font-semibold text-slate-600 tabular-nums">0%</span>
          </div>
          <div class="h-3 bg-slate-100 rounded-full overflow-hidden">
            <div class="gauge-fill h-full rounded-full bg-gradient-to-r from-cyan-300 to-cyan-400 gauge-fill-transition"
              style="width: 0%"></div>
          </div>
        </div>

        <!-- สระ (Vowel) — Pastel Pink -->
        <div id="gauge-vowel">
          <div class="flex justify-between items-baseline mb-1.5">
            <span class="text-sm font-medium text-slate-500">สระ</span>
            <span class="gauge-value text-sm font-semibold text-slate-600 tabular-nums">0%</span>
          </div>
          <div class="h-3 bg-slate-100 rounded-full overflow-hidden">
            <div class="gauge-fill h-full rounded-full bg-gradient-to-r from-pink-300 to-pink-400 gauge-fill-transition"
              style="width: 0%"></div>
          </div>
        </div>

        <!-- ตัวสะกด (Final Consonant) — Pastel Violet -->
        <div id="gauge-final">
          <div class="flex justify-between items-baseline mb-1.5">
            <span class="text-sm font-medium text-slate-500">ตัวสะกด</span>
            <span class="gauge-value text-sm font-semibold text-slate-600 tabular-nums">0%</span>
          </div>
          <div class="h-3 bg-slate-100 rounded-full overflow-hidden">
            <div
              class="gauge-fill h-full rounded-full bg-gradient-to-r from-violet-300 to-purple-400 gauge-fill-transition"
              style="width: 0%"></div>
          </div>
        </div>

        <!-- วรรณยุกต์ (Tone) — Pastel Yellow -->
        <div id="gauge-tone">
          <div class="flex justify-between items-baseline mb-1.5">
            <span class="text-sm font-medium text-slate-500">วรรณยุกต์</span>
            <span class="gauge-value text-sm font-semibold text-slate-600 tabular-nums">0%</span>
          </div>
          <div class="h-3 bg-slate-100 rounded-full overflow-hidden">
            <div
              class="gauge-fill h-full rounded-full bg-gradient-to-r from-amber-300 to-yellow-400 gauge-fill-transition"
              style="width: 0%"></div>
          </div>
        </div>
      </div>

      <!-- Dynamic Feedback (Stars + Main Message) -->
      <div id="feedback"
        class="bg-white rounded-2xl px-5 py-5 text-center w-full shadow-sm flex flex-col items-center gap-2 transition-all duration-500"
        style="opacity: 0; pointer-events: none;">
      </div>

      <!-- Per-Component Feedback List (Bulleted Advice) -->
      <div id="feedback-list" class="bg-white rounded-2xl px-5 py-4 w-full shadow-sm transition-all duration-500"
        style="opacity: 0; pointer-events: none;">
      </div>

      <!-- Next Word Button (shown on 3 stars) -->
      <button id="next-btn"
        class="bg-student-blue hover:bg-student-blue-hover text-white text-base shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 hover:-translate-y-1 active:scale-95 transition-all duration-200"
        style="display: none;">
        ไปคำถัดไป
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </button>

      <!-- Error / Status Message -->
      <div id="message" class="rounded-2xl px-5 py-4 text-center text-sm w-full transition-all duration-300"
        style="opacity: 0; pointer-events: none;">
      </div>
    </section>

  </div>

</body>

</html>
